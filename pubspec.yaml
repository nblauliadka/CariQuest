name: cariquest
description: "CariQuest — Skill Marketplace berbasis Talent Mahasiswa USK"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.4 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ─── UI & Icons ───────────────────────────────────────────────
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.0
  shimmer: ^3.0.0
  flutter_staggered_grid_view: ^0.7.0
  badges: ^3.1.2

  # ─── State Management ─────────────────────────────────────────
  flutter_riverpod: ^2.5.1

  # ─── Navigation ───────────────────────────────────────────────
  go_router: ^13.2.0

  # ─── Local Storage ────────────────────────────────────────────
  shared_preferences: ^2.2.3

  # ─── Utilities ────────────────────────────────────────────────
  intl: ^0.19.0
  uuid: ^4.4.0
  url_launcher: ^6.3.0
  flutter_animate: ^4.5.0
  timeago: ^3.6.0
  equatable: ^2.0.5
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
